name: Frontend PR

# Тесты и spotlessCheck фронта на каждый PR, который трогает фронтовые файлы
# или сборочные файлы — через gradle (:frontend:check), по аналогии с
# backend-pr.yml, чтобы PR гейтились теми же проверками, что и `./gradlew build`.
on:
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - 'gradle/**'
      - 'gradlew'
      - '.github/workflows/frontend-pr.yml'

permissions:
  contents: read

# Новый пуш в ту же PR-ветку отменяет предыдущий прогон.
concurrency:
  group: frontend-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  FRONTEND_DIR: frontend
  FRONTEND_MODULE: ':frontend'
  # Держим в синхроне с build.gradle → node { version = '22.22.3' }
  NODE_VERSION: '22.22.3'

jobs:
  test:
    name: Frontend tests & spotlessCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Cache node toolchain & modules
        uses: actions/cache@v6
        with:
          path: |
            ${{ env.FRONTEND_DIR }}/node_modules
            ${{ env.FRONTEND_DIR }}/.gradle/nodejs
            ${{ env.FRONTEND_DIR }}/.gradle/yarn
          key: ${{ runner.os }}-frontend-node-${{ env.NODE_VERSION }}-${{ hashFiles(format('{0}/yarn.lock', env.FRONTEND_DIR)) }}
          restore-keys: |
            ${{ runner.os }}-frontend-node-${{ env.NODE_VERSION }}-

      # :frontend:check прогоняет и yarnTest, и spotlessCheck (prettier) — см.
      # frontend/build.gradle (tasks.matching { it.name == 'check' }).
      - name: Run frontend tests & spotlessCheck
        run: ./gradlew "${FRONTEND_MODULE}:check" --no-daemon --stacktrace
