# Profile: internal
# Embedded H2 database — no PostgreSQL installation required.
# Semantic search is disabled (pgvector extension not available in H2).
# Database file is created at run/local-db/h2.mv.db on first launch.
#
# Usage: ./run.sh internal

spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:./local-db/h2;MODE=PostgreSQL;DEFAULT_NULL_ORDERING=HIGH;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
  flyway:
    locations: classpath:db/migration-h2
  h2:
    console:
      enabled: true
      settings:
        web-allow-others: true
  data:
    jdbc:
      dialect: postgresql

kb:
  search:
    semantic:
      enabled: false
  embedding:
    cache:
      enabled: false
