spring:
  application:
    name: kb-demo
  ai:
    openai:
      base-url: ${AI_BASE_URL}
      api-key: ${AI_API_KEY}
      chat:
        options:
          model: ${AI_MODEL}
          max-tokens: 30000
          extra-body:
            thinking:
              type: disabled
          temperature: 0.2
      embedding:
        base-url: ${AI_EMBED_BASE_URL:${AI_BASE_URL}}
        api-key: ${AI_EMBED_API_KEY:${AI_API_KEY}}
        embeddings-path: /embeddings
        options:
          model: ${AI_EMBED_MODEL}   # 1536-dim
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
      client:
        enabled: off
    retry:
      max-attempts: 2
  datasource:
    driver-class-name: org.postgresql.Driver
    url: "jdbc:postgresql://localhost:5432/knowledgebase"
    username: "knowledgebase"
    password: "knowledgebase"
  sql:
    init:
      mode: always
      schema-locations: classpath:db/init-schema.sql
  threads:
    virtual:
      enabled: true

server:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

kb:
  documents:
    export-path: ${DOCUMENTS_EXPORT_PATH}
    replace: true
  project-path: ${PROJECT_PATH}
  embedding:
    # Must match spring.ai.openai.embedding.options.model.
    # Stored alongside every cached vector so that model upgrades invalidate old cache rows.
    model: ${AI_EMBED_MODEL}
    # Number of documents sent to embedBatch() per slice during reindexAll().
    # Keep below OpenAI's per-request limit (~2 048 inputs / ~300 k tokens).
    reindex-batch-size: 50
    cache:
      # Set to false to bypass the Postgres cache entirely (e.g. in tests).
      enabled: true
      # Rows not accessed for this many days are deleted by EmbeddingCacheCleanupTask.
      ttl-days: 30
      # Spring cron expression for the cleanup job (server local time).
      # Default: every day at 02:00.
      cleanup-cron: "0 0 2 * * *"
    chunker:
      # Maximum tokens per chunk. Must be well below the model's 8 192-token limit.
      max-tokens: 512
      # Token overlap between adjacent chunks to avoid missing cross-boundary context.
      overlap-tokens: 64
  search:
    keyword:
      limit: 20
    semantic:
      threshold: 0.20
      limit: 20
    hybrid:
      keyword-weight: 0.4   # вес keyword-результатов (0..1)
      semantic-weight: 0.6  # вес semantic-результатов (0..1)
      threshold: 0.20       # минимальная семантическая схожесть
      limit: 20

