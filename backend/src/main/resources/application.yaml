spring:
  application:
    name: kb-demo
  ai:
    openai:
      base-url: ${AI_BASE_URL}
      api-key: ${AI_API_KEY}
      # Call timeout of the openai-java SDK client shared by every OpenAI model (chat, embedding,
      # ...). Drives BOTH the SDK's own request deadline (ClientOptions.timeout — the thing that
      # actually cancels a call) and the underlying OkHttp client's timeouts. Default (60s, see
      # AbstractOpenAiProperties.DEFAULT_TIMEOUT) is too short for long tool-call/generation
      # rounds and aborts the stream mid-flight with OpenAIIoException/StreamResetException(CANCEL).
      timeout: ${KB_CHAT_STREAM_TIMEOUT:10m}
      chat:
        model: ${kb.chat.default-model.id}
        max-tokens: 30000
        temperature: 0.1
        top-p: 0.8
#        extra-body:
#          thinking:
#            type: disabled
      embedding:
        base-url: ${AI_EMBED_BASE_URL:${AI_BASE_URL}}
        api-key: ${AI_EMBED_API_KEY:${AI_API_KEY}}
        model: ${kb.embedding.model:bge-m3}   # 1024-dim
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: never
      client:
        enabled: off
    retry:
      max-attempts: 2
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/knowledgebase}
    username: ${DATASOURCE_USERNAME:knowledgebase}
    password: ${DATASOURCE_PASSWORD:knowledgebase}
    hikari:
      minimum-idle: 1
      maximum-pool-size: 10
      idle-timeout: 300000
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false
    # Доступно в миграциях как ${default_user}. По умолчанию = пользователь из kb.security.
    placeholders:
      default_user: ${kb.security.username:admin}
  threads:
    virtual:
      enabled: true
  servlet:
    multipart:
      max-file-size: 1MB
      max-request-size: 2MB
  mvc:
    async:
      request-timeout: 30m

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

kb:
  security:
    # Учётные данные единственного пользователя (HTTP Basic, in-memory).
    username: ${KB_SECURITY_USERNAME:admin}
    password: ${KB_SECURITY_PASSWORD:admin}
  chat:
    default-model:
      id: ${AI_MODEL}
      label: ${AI_MODEL_LABEL:Default}
#    models:
#      - id: ${KB_CHAT_MODELS_0_ID}
#        label: ${KB_CHAT_MODELS_0_LABEL}
    timeout:
      # SseEmitter timeout per browser tab subscription (replay/reconnect window).
      sse: ${KB_CHAT_SSE_TIMEOUT:30m}
    summarize:
      # Estimated token budget for the "live" messages window before summarization kicks in.
      token-threshold: ${KB_CHAT_SUMMARIZE_TOKEN_THRESHOLD:30000}
      # Minimum number of compressible messages before summarization kicks in.
      message-count-threshold: ${KB_CHAT_SUMMARIZE_MESSAGE_COUNT_THRESHOLD:50}
      # Recent messages kept outside the summarized window as live context.
      overlap-messages: ${KB_CHAT_SUMMARIZE_OVERLAP_MESSAGES:30}
      # Number of stored summaries that triggers collapsing them into one meta-summary.
      summary-collapse-threshold: ${KB_CHAT_SUMMARIZE_SUMMARY_COLLAPSE_THRESHOLD:5}
      # Characters per estimated token (rough heuristic, no real tokenizer).
      chars-per-token: ${KB_CHAT_SUMMARIZE_CHARS_PER_TOKEN:4}
  documents:
    export-path: ${DOCUMENTS_EXPORT_PATH}
    replace: true
  project-path: ${PROJECT_PATH}
  backfill:
    # One-off: backfills messageId/callId/responseMessageId into old chat_message.meta rows on
    # startup (see ToolCallIdBackfillRunner). Off by default — flip on for one deploy, then off.
    tool-call-ids: ${KB_BACKFILL_TOOL_CALL_IDS:false}
  git:
    # Expose file edit tools (createFile/editFile) to the chat model. Default off — read-only.
    # Even when true, the tools are withheld if the working tree is not writable (ro mount).
    edit-enabled: ${KB_GIT_EDIT_ENABLED:false}
  embedding:
    # Must match spring.ai.openai.embedding.options.model.
    # Stored alongside every cached vector so that model upgrades invalidate old cache rows.
    model: ${AI_EMBED_MODEL}
    # Number of documents sent to embedBatch() per slice during reindexAll().
    # Keep below OpenAI's per-request limit (~2 048 inputs / ~300 k tokens).
    reindex-batch-size: 50
    # Max concurrent OpenAI embedding API calls (semaphore on virtual-thread executor).
    workers: 4
    # How many embedding_tasks rows to claim per scheduler poll.
    poll-batch-size: 20
    # Delay between scheduler polls in milliseconds.
    poll-interval-ms: 1000
    # Maximum attempts before a task is permanently marked failed.
    max-attempts: 3
    # Linear retry backoff: a failed task waits attempts * this many seconds before re-claim.
    retry-backoff-seconds: 30
    # Minutes a task may stay in 'starting' before the stuck-task reaper resets it.
    stuck-timeout-minutes: 10
    # Delay between stuck-task reaper runs in milliseconds.
    stuck-check-ms: 300000
    # Days to keep done/failed/superseded rows before cleanup deletes them.
    cleanup-retention-days: 7
    cache:
      # Set to false to bypass the Postgres cache entirely (e.g. in tests).
      enabled: true
      # Rows not accessed for this many days are deleted by EmbeddingCacheCleanupTask.
      ttl-days: 30
      # Spring cron expression for the cleanup job (server local time).
      # Default: every day at 02:00.
      cleanup-cron: "0 0 2 * * *"
    chunker:
      # Maximum tokens per chunk. Must be well below the model's 8 192-token limit.
      max-tokens: 512
      # Token overlap between adjacent chunks to avoid missing cross-boundary context.
      overlap-tokens: 64
  search:
    keyword:
      limit: 20
    semantic:
      enabled: true
      threshold: 0.20
      limit: 20
    hybrid:
      keyword-weight: 0.4   # вес keyword-результатов (0..1)
      semantic-weight: 0.6  # вес semantic-результатов (0..1)
      threshold: 0.20       # минимальная семантическая схожесть
      limit: 20
    subagent:
      # Search sub-agent exposed to the chat model as the `searchCodebase` tool.
      enabled: ${KB_SEARCH_SUBAGENT_ENABLED:true}
      # May differ from the main chat model (e.g. a cheaper/faster one). Defaults to the main model.
      model-id: ${KB_SEARCH_SUBAGENT_MODEL:${AI_MODEL}}
      max-tokens: ${KB_SEARCH_SUBAGENT_MAX_TOKENS:12000}
      # Hard cap on tool-call rounds before a forced, tool-less summarization call.
      max-iterations: ${KB_SEARCH_SUBAGENT_MAX_ITERATIONS:30}
      # Read-only tools the sub-agent may call. MUST NOT include searchCodebase (recursion guard).
      allowed-tools:
        - grepContent
        - searchFiles
        - getFileTree
        - getFileOutline
        - getFileContent
        - searchDocuments
        - findDocumentsByName
        - getDocument
        - getDocumentOutline
        - getDocumentSection
        - getTreeSkeleton
  atlassian:
    jira:
      base-url: ${JIRA_BASE_URL:}
      api-token: ${JIRA_TOKEN:}
    confluence:
      base-url: ${CONFLUENCE_BASE_URL:}
      api-token: ${CONFLUENCE_TOKEN:}

